# Triggers on pushes to main that touch landing/** and on manual dispatch.
# Publishes the single-file landing/ static site to the github-pages environment.
name: landing-deploy

on:
  push:
    branches: [main]
    paths:
      - landing/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  # OIDC token required by actions/deploy-pages
  id-token: write

# Never cancel an in-flight Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      # landing/ is a single-file static HTML site, so we upload it as-is
      # (no pnpm/node build step required).
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
