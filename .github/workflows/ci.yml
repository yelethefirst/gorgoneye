name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: lint / typecheck / unit tests / coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm build
      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-mv3
          path: .output/chrome-mv3
          if-no-files-found: error
          retention-days: 7

  e2e:
    name: playwright e2e (loads built extension in Chromium)
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      # Extension loading requires a real display server even in headed
      # Chromium, so run under xvfb.
      - name: Run Playwright (xvfb)
        run: xvfb-run --auto-servernum pnpm test:e2e
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            tests/e2e/.results/
          retention-days: 7
